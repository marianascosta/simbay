services:
  simbay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simbay
    environment:
      MPLBACKEND: Agg
      SIMBAY_HEADLESS: "1"
      SIMBAY_USE_MJX: "1"
      SIMBAY_METRICS_ENABLED: "1"
      SIMBAY_METRICS_PORT: "8000"
    mem_limit: 10g
    volumes:
      - ./logs:/app/logs
      - ./temp:/app/temp
    ports:
      - "8000:8000"
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  prometheus:
    image: prom/prometheus:latest
    container_name: simbay-prometheus
    depends_on:
      - simbay
      - node-exporter
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    volumes:
      - ./monitoring/prometheus/prometheus.compose.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana-oss:latest
    container_name: simbay-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

  node-exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: simbay-node-exporter
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:latest
    container_name: simbay-dcgm-exporter
    profiles:
      - gpu
    gpus: all
    ports:
      - "9400:9400"

volumes:
  prometheus-data:
  grafana-data:
