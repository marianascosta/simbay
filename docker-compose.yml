services:
  simbay:
    build:
      context: .
      dockerfile: Dockerfile
      target: cuda
    container_name: simbay
    environment:
      MPLBACKEND: Agg
      SIMBAY_HEADLESS: "1"
      SIMBAY_USE_MJX: "1"
      SIMBAY_BACKEND: warp
      SIMBAY_METRICS_ENABLED: "1"
      SIMBAY_METRICS_PORT: "8000"
    mem_limit: 10g
    volumes:
      - ./logs:/app/logs
      - ./temp:/app/temp
    ports:
      - "8000:8000"
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  prometheus:
    image: prom/prometheus:latest
    container_name: simbay-prometheus
    depends_on:
      - simbay
      - node-exporter
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    volumes:
      - ./monitoring/prometheus/prometheus.compose.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana-oss:latest
    container_name: simbay-grafana
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

  node-exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: simbay-node-exporter
    ports:
      - "9100:9100"

  loki:
    image: grafana/loki:3.0.0
    container_name: simbay-loki
    command:
      - -config.file=/etc/loki/config.yml
    volumes:
      - ./monitoring/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.0.0
    container_name: simbay-promtail
    depends_on:
      - loki
    command:
      - -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - promtail-data:/tmp/promtail
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:latest
    container_name: simbay-dcgm-exporter
    profiles:
      - gpu
    gpus: all
    ports:
      - "9400:9400"

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  promtail-data:
