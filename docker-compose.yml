services:
  simbay:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    container_name: simbay
    depends_on:
      - tempo
    environment:
      SIMBAY_PARTICLES: "${SIMBAY_PARTICLES:-100}"
      SIMBAY_HEADLESS: "1"
      SIMBAY_BACKEND: "${SIMBAY_BACKEND:-mujoco-warp}"
      SIMBAY_DOCKER_TARGET: "base"
      SIMBAY_ENABLE_NSIGHT: "${SIMBAY_ENABLE_NSIGHT:-1}"

    mem_limit: 10g
    volumes:
      - ./logs:/app/logs
      - ./temp:/app/temp
    ports:
      - "8000:8000"
    stdin_open: true
    tty: true
  prometheus:
    image: prom/prometheus:latest
    container_name: simbay-prometheus
    depends_on:
      - simbay
      - node-exporter
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    volumes:
      - ./monitoring/prometheus/prometheus.compose.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana-oss:latest
    container_name: simbay-grafana
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data-v2:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

  node-exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: simbay-node-exporter
    ports:
      - "9100:9100"

  loki:
    image: grafana/loki:3.0.0
    container_name: simbay-loki
    command:
      - -config.file=/etc/loki/config.yml
    volumes:
      - ./monitoring/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.0.0
    container_name: simbay-promtail
    depends_on:
      - loki
    command:
      - -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - promtail-data:/tmp/promtail
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  tempo:
    image: grafana/tempo:2.10.0
    container_name: simbay-tempo
    user: "0:0"
    command: ["-target=all", "-config.file=/etc/tempo/config.yml"]
    volumes:
      - ./monitoring/tempo/config.yml:/etc/tempo/config.yml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "4317:4317"
      - "3200:3200"

volumes:
  prometheus-data:
  grafana-data-v2:
  loki-data:
  promtail-data:
  tempo-data:
