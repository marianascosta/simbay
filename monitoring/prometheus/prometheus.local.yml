global:
  scrape_interval: 1s
  evaluation_interval: 1s

scrape_configs:
  - job_name: simbay
    static_configs:
      - targets: ["localhost:8000"]

  - job_name: node-exporter
    static_configs:
      - targets: ["localhost:9100"]

  - job_name: dcgm-exporter
    static_configs:
      - targets: ["localhost:9400"]
