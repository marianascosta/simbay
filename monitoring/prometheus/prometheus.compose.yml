global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: simbay
    static_configs:
      - targets: ["simbay:8000"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: dcgm-exporter
    static_configs:
      - targets: ["dcgm-exporter:9400"]
